services:
  venera-web:
    build: .
    restart: unless-stopped
    ports:
      - "60098:60098"
    environment:
      PORT: "60098"
      VENERA_STATIC_DIR: /app/public
      VENERA_BROWSER_DATA_DIR: /app/browser-data
      VENERA_COOKIE_JAR_PATH: /app/browser-data/helper-cookies.json
      VENERA_SERVER_DATA_DIR: /app/server-data
      VENERA_BROWSER_HEADLESS: "true"
      VENERA_FETCH_SIDECAR: http://127.0.0.1:9876
    volumes:
      - browser-data:/app/browser-data
      - server-data:/app/server-data

volumes:
  browser-data:
  server-data:
