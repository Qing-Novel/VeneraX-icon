name: Build ALL
run-name: Build ALL
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build (release always builds all)"
        type: choice
        default: all
        required: false
        options:
          - all
          - ios
          - android
          - windows
          - macos
          - linux
  release:
    types: [published]

permissions:
  contents: write

jobs:
  Build_MacOS:
    runs-on: macos-15
    if: ${{ github.event_name == 'release' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - run: flutter pub get
        # Step 1: Decode and install the certificate
      - name: Decode and install certificate
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE" ] && [ -z "$CERTIFICATE_PASSWORD" ]; then
            echo "macOS signing secrets are not configured; building unsigned macOS app."
            exit 0
          fi
          test -n "$CERTIFICATE" || { echo "CERTIFICATE secret is missing"; exit 1; }
          test -n "$CERTIFICATE_PASSWORD" || { echo "CERTIFICATE_PASSWORD secret is missing"; exit 1; }
          echo "$CERTIFICATE" | base64 --decode > signing_certificate.p12
          security import signing_certificate.p12 -k ~/Library/Keychains/login.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign

      - name: Check rust-toolchain.toml
        run: rustup show

      # Step 2: Build the Flutter macOS app
      - name: Build Flutter macOS App
        run: flutter build macos --release

      # Step 3: Create the DMG file
      - name: Create DMG
        run: |
          mkdir -p dist
          mkdir -p dist/dmg_contents
          cp -R build/macos/Build/Products/Release/venera.app dist/dmg_contents/
          ln -s /Applications dist/dmg_contents/Applications
          hdiutil create -volname "venera" -srcfolder dist/dmg_contents -ov -format UDZO "dist/venera.dmg"

      - name: Add version to filename
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          mkdir -p result
          mv dist/venera.dmg result/venera-$APP_VERSION.dmg

      # Step 4: Attach and upload artifacts (optional)
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos_build
          path: result/
  Build_IOS:
    runs-on: macos-15
    if: ${{ github.event_name == 'release' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: |
          mkdir -p /Users/runner/work/venera/venera/build/ios/iphoneos/Payload
          mv /Users/runner/work/venera/venera/build/ios/iphoneos/Runner.app /Users/runner/work/venera/venera/build/ios/iphoneos/Payload
          cd /Users/runner/work/venera/venera/build/ios/iphoneos/
          zip -r venera-ios.ipa Payload
      - name: Add version to filename
        run: |
          APP_VERSION=$(grep "version:" pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          mkdir -p result
          mv build/ios/iphoneos/venera-ios.ipa result/venera-ios-$APP_VERSION.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: ios_build
          path: result/
  Build_Android:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'release' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    steps:
      - uses: actions/checkout@v3
      - run: rm -rf /opt/hostedtoolcache
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: Verify Android signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
            set -euo pipefail
            test -n "$KEYSTORE_BASE64" || { echo "ANDROID_KEYSTORE_BASE64 secret is missing"; exit 1; }
            test -n "$KEYSTORE_PASSWORD" || { echo "ANDROID_KEYSTORE_PASSWORD secret is missing"; exit 1; }
            test -n "$KEY_ALIAS" || { echo "ANDROID_KEY_ALIAS secret is missing"; exit 1; }
            test -n "$KEY_PASSWORD" || { echo "ANDROID_KEY_PASSWORD secret is missing"; exit 1; }
      - name: Decode and install Android signing files
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
            {
              printf 'storeFile=keystore.jks\n'
              printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
              printf 'keyAlias=%s\n' "$KEY_ALIAS"
              printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            } > android/key.properties
      - uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'
      - name: Check rust-toolchain.toml
        run: rustup show
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/apk/release
  Build_Windows:
    runs-on: windows-latest
    if: ${{ github.event_name == 'release' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    steps:
      - uses: actions/checkout@v3
      - name: install dependencies
        run: | 
          choco install yq -y
          pip install httpx
      - name: Install Inno Setup
        run: choco install innosetup --no-progress
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: build
        run: |
          flutter pub get
          python windows/build.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: build/windows/Venera-*
  Build_Linux:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'release' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1 libayatana-appindicator3-dev
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - run: python3 debian/build.py x64
      - run: dart run flutter_to_arch
      - run: |
          sudo rm -rf build/linux/arch/app.tar.gz
          sudo rm -rf build/linux/arch/pkg
          sudo rm -rf build/linux/arch/src
          sudo rm -rf build/linux/arch/PKGBUILD
      - uses: actions/upload-artifact@v4
        with:
          name: deb_build
          path: build/linux/x64/release/debian
      - uses: actions/upload-artifact@v4
        with:
          name: arch_build
          path: build/linux/arch/
  Build_Linux_ARM64:
    runs-on: ubuntu-22.04-arm
    if: ${{ github.event_name == 'release' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version-file: pubspec.yaml
      - run: |
          flutter pub get
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1 libayatana-appindicator3-dev
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - name: "Patch font"
        run: |
          dart run patch/font.dart
      - run: python3 debian/build.py arm64
      - uses: actions/upload-artifact@v4
        with:
          name: deb_arm64_build
          path: build/linux/x64/release/debian # This is a bug related to flutter_to_debian, but it's not a big deal.

  Release:
    runs-on: ubuntu-22.04
    needs: [Build_MacOS, Build_IOS, Build_Android, Build_Windows, Build_Linux, Build_Linux_ARM64]
    if: github.event_name == 'release'  # 仅在 push 事件时执行
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: ios_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: apks
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: windows_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: deb_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: arch_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: deb_arm64_build
          path: outputs
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            outputs/*.ipa
            outputs/*.dmg
            outputs/*.apk
            outputs/*.zip
            outputs/*.exe
            outputs/*.deb
            outputs/*.zst
            outputs/*.AppImage
        env:
          GITHUB_TOKEN: ${{ github.token }}

  Update_AltStore_Source:
    runs-on: ubuntu-22.04
    needs: [Release]
    # Pre-releases are for internal testing only: they must never be pushed to
    # AltStore users. (The in-app updater is safe by itself — GitHub's
    # releases/latest API never returns pre-releases — but this job would
    # otherwise overwrite the manifest with the beta.)
    if: github.event_name == 'release' && !github.event.release.prerelease
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gather release metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          DL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name|endswith(".ipa")) | .url' | head -1)
          SZ=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name|endswith(".ipa")) | .size' | head -1)
          PUB=$(gh release view "$TAG" --json publishedAt --jq '.publishedAt' | cut -dT -f1)
          VER=$(grep '^version:' pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          test -n "$DL" || { echo "No .ipa asset found in release $TAG"; exit 1; }
          {
            echo "download_url=$DL"
            echo "size=$SZ"
            echo "pub_date=$PUB"
            echo "version=${VER%%+*}"
            echo "build=${VER##*+}"
          } >> "$GITHUB_OUTPUT"
      - name: Regenerate AltStore manifest
        env:
          SOURCE_FILE: altstore-source.json
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD: ${{ steps.meta.outputs.build }}
          DOWNLOAD_URL: ${{ steps.meta.outputs.download_url }}
          SIZE: ${{ steps.meta.outputs.size }}
          PUB_DATE: ${{ steps.meta.outputs.pub_date }}
          MIN_OS: '14.0'
        run: |
          set -euo pipefail
          if [ -f "release-notes/${TAG}.en.md" ]; then
            export NOTES_FILE="release-notes/${TAG}.en.md"
          fi
          node .github/scripts/gen-altstore-source.mjs
      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- altstore-source.json; then
            echo "altstore-source.json unchanged; nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add altstore-source.json
          git commit -m "chore: 更新 AltStore 安装清单至 ${{ github.ref_name }}"
          git push origin HEAD:master

  # Beta counterpart of Update_AltStore_Source: pre-releases update ONLY the
  # separate beta manifest, which testers subscribe to explicitly. Stable users
  # (altstore-source.json + the in-app updater) never see these builds.
  Update_AltStore_Beta_Source:
    runs-on: ubuntu-22.04
    needs: [Release]
    if: github.event_name == 'release' && github.event.release.prerelease
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gather release metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          DL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name|endswith(".ipa")) | .url' | head -1)
          SZ=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name|endswith(".ipa")) | .size' | head -1)
          PUB=$(gh release view "$TAG" --json publishedAt --jq '.publishedAt' | cut -dT -f1)
          VER=$(grep '^version:' pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          test -n "$DL" || { echo "No .ipa asset found in release $TAG"; exit 1; }
          {
            echo "download_url=$DL"
            echo "size=$SZ"
            echo "pub_date=$PUB"
            echo "version=${VER%%+*}"
            echo "build=${VER##*+}"
          } >> "$GITHUB_OUTPUT"
      - name: Regenerate beta AltStore manifest
        env:
          SOURCE_FILE: altstore-source-beta.json
          BETA: 'true'
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD: ${{ steps.meta.outputs.build }}
          DOWNLOAD_URL: ${{ steps.meta.outputs.download_url }}
          SIZE: ${{ steps.meta.outputs.size }}
          PUB_DATE: ${{ steps.meta.outputs.pub_date }}
          MIN_OS: '14.0'
        run: |
          set -euo pipefail
          if [ -f "release-notes/${TAG}.en.md" ]; then
            export NOTES_FILE="release-notes/${TAG}.en.md"
          fi
          node .github/scripts/gen-altstore-source.mjs
      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- altstore-source-beta.json; then
            echo "altstore-source-beta.json unchanged; nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add altstore-source-beta.json
          git commit -m "chore: 更新 AltStore 测试版清单至 ${{ github.ref_name }}"
          git push origin HEAD:master
